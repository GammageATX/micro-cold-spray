pressure_monitoring:
  chamber:
    access: read
    description: "Chamber vacuum pressure"
    mapped: true
    plc_tag: ChamberPressure
    range: [0.01, 1000.0]
    scaling: 12bit_linear
    type: float
    unit: torr
  
  feeder:
    access: read
    description: "Powder feeder pressure"
    mapped: true
    plc_tag: FeederPressure
    range: [0.0, 1520.0]
    scaling: 12bit_linear
    type: float
    unit: torr
  
  main_supply:
    access: read
    description: "Main gas supply pressure"
    mapped: true
    plc_tag: MainGasPressure
    range: [0.0, 1520.0]
    scaling: 12bit_linear
    type: float
    unit: torr
  
  nozzle:
    access: read
    description: "Nozzle pressure"
    mapped: true
    plc_tag: NozzlePressure
    range: [0.0, 1520.0]
    scaling: 12bit_linear
    type: float
    unit: torr
  
  regulator:
    access: read
    description: "Regulator pressure"
    mapped: true
    plc_tag: RegulatorPressure
    range: [0.0, 1520.0]
    scaling: 12bit_linear
    type: float
    unit: torr 