{% extends "base.html" %}

{% block breadcrumb %}
<li class="breadcrumb-item">Monitoring</li>
<li class="breadcrumb-item active">Tags</li>
{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="card mb-4">
            <div class="card-header d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="card-title mb-0">
                        <i class="fas fa-tags"></i>
                        Tag Monitor
                    </h5>
                    <small class="text-muted">Real-time monitoring of system tags and values.</small>
                </div>
                <div class="btn-group">
                    <button class="btn btn-outline-primary" id="pauseButton">
                        <i class="fas fa-pause"></i> Pause Updates
                    </button>
                    <button class="btn btn-outline-success" id="exportButton">
                        <i class="fas fa-download"></i> Export Data
                    </button>
                </div>
            </div>
            <div class="card-body">
                <div class="input-group mb-3">
                    <span class="input-group-text">
                        <i class="fas fa-search"></i>
                    </span>
                    <input type="text" class="form-control" id="tagFilter" placeholder="Filter tags...">
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row" id="tagMonitor">
    <!-- Tag cards will be dynamically inserted here -->
    <div class="col-12">
        <div class="card">
            <div class="card-body text-center py-5">
                <div class="spinner-border text-primary mb-3" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="text-muted mb-0">Connecting to tag service...</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    // Initialize with API URLs from server
    (function() {
        const apiUrls = {{ api_urls | tojson | safe }};
        document.getElementById('apiUrls').dataset.urls = JSON.stringify(apiUrls);
    })();

    // Add tag filtering
    const tagFilter = document.getElementById('tagFilter');
    tagFilter.addEventListener('input', (e) => {
        const filter = e.target.value.toLowerCase();
        const tagCards = document.querySelectorAll('#tagMonitor [data-tag-name]');
        
        tagCards.forEach(card => {
            const tagName = card.dataset.tagName.toLowerCase();
            card.style.display = tagName.includes(filter) ? '' : 'none';
        });
    });

    // Add pause/resume functionality
    const pauseButton = document.getElementById('pauseButton');
    let isPaused = false;

    pauseButton.addEventListener('click', () => {
        isPaused = !isPaused;
        pauseButton.innerHTML = isPaused ? 
            '<i class="fas fa-play"></i> Resume Updates' :
            '<i class="fas fa-pause"></i> Pause Updates';
        
        if (isPaused) {
            pauseButton.classList.replace('btn-outline-primary', 'btn-outline-warning');
        } else {
            pauseButton.classList.replace('btn-outline-warning', 'btn-outline-primary');
        }
    });

    // Add export functionality
    document.getElementById('exportButton').addEventListener('click', () => {
        const tagCards = document.querySelectorAll('#tagMonitor [data-tag-name]');
        const exportData = Array.from(tagCards).map(card => ({
            name: card.dataset.tagName,
            value: card.querySelector('.tag-value').textContent,
            timestamp: card.querySelector('.tag-timestamp').textContent
        }));

        const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `tag-data-${new Date().toISOString()}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    });

    // Override the updateTagDisplay function to respect pause state
    window.addEventListener('DOMContentLoaded', () => {
        const originalUpdateTagDisplay = window.mcsControl.handleTagUpdate;
        window.mcsControl.handleTagUpdate = (data) => {
            if (!isPaused) {
                originalUpdateTagDisplay.call(window.mcsControl, data);
            }
        };
    });
</script>
{% endblock %}
